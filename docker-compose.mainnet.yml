version: '3.8'

services:
  # Validator Analytics API - Mainnet Configuration
  validator-analytics-api:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: production
    container_name: validator-analytics-api-mainnet
    ports:
      - "3001:3001"
      - "9090:9090"  # Metrics endpoint
    env_file:
      - .env.mainnet
    environment:
      - NODE_ENV=production
      - SOLANA_CLUSTER=mainnet-beta
      - SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
      - API_BASE_URL=https://validator-analytics-api.phase.com
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - api-cache:/app/cache
    restart: unless-stopped
    networks:
      - mainnet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for high-performance caching
  redis:
    image: redis:7-alpine
    container_name: redis-mainnet
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: ["redis-server", "/etc/redis/redis.conf"]
    restart: unless-stopped
    networks:
      - mainnet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Prometheus for comprehensive metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-mainnet
    ports:
      - "9091:9090"  # Use 9091 to avoid conflicts
    volumes:
      - ./monitoring/prometheus.mainnet.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--alertmanager.timeout=10s'
    restart: unless-stopped
    networks:
      - mainnet-network
    depends_on:
      - validator-analytics-api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Grafana for metrics visualization and alerting
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-mainnet
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-mainnet-admin-secure}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SERVER_ROOT_URL=https://validator-analytics.phase.com/grafana/
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboard-definitions:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - mainnet-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # Nginx reverse proxy for production load balancing and SSL termination
  nginx:
    image: nginx:alpine
    container_name: nginx-mainnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/mainnet.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - mainnet-network
    depends_on:
      validator-analytics-api:
        condition: service_healthy
      grafana:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-mainnet
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - mainnet-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  # Redis Exporter for Redis metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter-mainnet
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: unless-stopped
    networks:
      - mainnet-network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.02'
          memory: 32M

  # Log aggregation service (optional)
  fluentd:
    image: fluentd:v1.16-1
    container_name: fluentd-mainnet
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - ./monitoring/fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - fluentd-logs:/fluentd/log
    restart: unless-stopped
    networks:
      - mainnet-network
    profiles:
      - logging  # Only run when explicitly requested
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  mainnet-network:
    driver: bridge
    name: validator-analytics-mainnet
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    name: validator-analytics-redis-mainnet
    driver: local
  prometheus-data:
    name: validator-analytics-prometheus-mainnet
    driver: local
  grafana-data:
    name: validator-analytics-grafana-mainnet
    driver: local
  nginx-logs:
    name: validator-analytics-nginx-logs-mainnet
    driver: local
  api-cache:
    name: validator-analytics-cache-mainnet
    driver: local
  fluentd-logs:
    name: validator-analytics-fluentd-mainnet
    driver: local

# Production deployment endpoints:
# - API Health: https://validator-analytics-api.phase.com/health
# - API Metrics: https://validator-analytics-api.phase.com/metrics (restricted)
# - Prometheus: https://validator-analytics-api.phase.com/prometheus/ (internal)
# - Grafana: https://validator-analytics-api.phase.com/grafana/ (admin access)
# - API Documentation: https://validator-analytics-api.phase.com/docs (if enabled)
#
# To deploy to mainnet:
# 1. Set environment variables in .env.mainnet
# 2. Generate SSL certificates and place in nginx/ssl/
# 3. Run: docker-compose -f docker-compose.mainnet.yml up -d
#
# To run with log aggregation:
# docker-compose -f docker-compose.mainnet.yml --profile logging up -d
#
# To scale the API:
# docker-compose -f docker-compose.mainnet.yml up -d --scale validator-analytics-api=3