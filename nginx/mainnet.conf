# Nginx Server Configuration for Validator Analytics API - Mainnet
upstream validator_api_backend {
    server validator-analytics-api:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream grafana_backend {
    server grafana:3000;
    keepalive 8;
}

upstream prometheus_backend {
    server prometheus:9090;
    keepalive 4;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name validator-analytics-api.phase.com validator-analytics.phase.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS Server
server {
    listen 443 ssl http2;
    server_name validator-analytics-api.phase.com validator-analytics.phase.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/validator-analytics.pem;
    ssl_certificate_key /etc/nginx/ssl/validator-analytics.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozTLS:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers for production
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # Main API endpoints
    location / {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://validator_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for production
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings for performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Enable caching for appropriate responses
        proxy_cache_valid 200 302 5m;
        proxy_cache_valid 404 1m;
        
        # Custom headers
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Response-Time $request_time always;
    }

    # Health check endpoint (minimal rate limiting for monitoring)
    location /health {
        limit_req zone=health burst=10 nodelay;
        
        proxy_pass http://validator_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Faster timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Don't cache health checks
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        
        # Don't log health checks to reduce noise
        access_log off;
    }

    # Metrics endpoint (restricted access and rate limiting)
    location /metrics {
        limit_req zone=metrics burst=5 nodelay;
        
        # Restrict access to internal networks and monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        # Add your monitoring system IPs here
        # allow 203.0.113.0/24;  # Example monitoring network
        deny all;
        
        proxy_pass http://validator_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for metrics
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        proxy_cache off;
    }

    # API Documentation (conditionally enabled)
    location /docs {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://validator_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache documentation for performance
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Grafana monitoring dashboard (internal access)
    location /grafana/ {
        # Restrict to internal access
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        # Add your office/admin IPs here
        # allow 203.0.113.100;  # Example admin IP
        deny all;
        
        proxy_pass http://grafana_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Grafana live features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prometheus (internal access only)
    location /prometheus/ {
        # Restrict to internal networks only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://prometheus_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for live metrics
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Robots.txt (prevent indexing of API endpoints)
    location /robots.txt {
        add_header Content-Type text/plain always;
        return 200 "User-agent: *\nDisallow: /\n";
        access_log off;
    }

    # Security.txt for responsible disclosure
    location /.well-known/security.txt {
        add_header Content-Type text/plain always;
        return 200 "Contact: security@phase.com\nExpires: 2025-12-31T23:59:59Z\n";
        access_log off;
    }

    # Block common attack patterns
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(sql|git|env|log|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Detailed access logging for production
    access_log /var/log/nginx/validator-analytics.access.log main;
    error_log /var/log/nginx/validator-analytics.error.log warn;
}